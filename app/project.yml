name: LaboLabo

options:
  bundleIdPrefix: com.love-rox
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  # UI 文字列は日本語をソースとし、String Catalog で英語を追加する。
  developmentLanguage: ja

packages:
  # Local Swift package at the repo root (LaboLaboEngine et al.).
  LaboLaboCore:
    path: ..
  # Prebuilt libghostty (GhosttyKit.xcframework) + Swift/SwiftUI terminal wrappers.
  LibghosttySPM:
    url: https://github.com/Lakr233/libghostty-spm.git
    from: "1.2.8"

targets:
  LaboLabo:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: ../CHANGELOG.md
        buildPhase: resources
    dependencies:
      - package: LaboLaboCore
        product: LaboLaboEngine
      - package: LaboLaboCore
        product: LaboLaboStore
      - package: LibghosttySPM
        product: GhosttyTerminal
    configFiles:
      Debug: ../Config/Version.xcconfig
      Release: ../Config/Version.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.love-rox.labolabo
        PRODUCT_NAME: LaboLabo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        # String Catalog へ Text("…") / String(localized:) を自動抽出（欠落検出用）。
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets: []
