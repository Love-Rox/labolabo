name: 機能リクエスト
description: 新機能・改善の提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題・背景
      description: どんな場面で、何に困っていますか？
      placeholder: 例）複数リポジトリを横断して差分をまとめて見たい
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: どう解決したいか（UI 案・挙動など）
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・既存の回避策（任意）
    validations:
      required: false
