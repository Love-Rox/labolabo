name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test
    runs-on: macos-15
    # 健全な実行は ~2-3 分だが、GitHub の macOS ランナーで稀に swift test（ビルド/テスト）が
    # 無限ハングする。各試行を 7 分で打ち切り最大 3 回リトライ、全体上限 25 分の保険を掛ける。
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Run tests (retry on flaky runner hang)
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::group::swift test (attempt ${attempt}/3)"
            swift test &
            pid=$!
            # ウォッチドッグ: 7 分でこの試行を強制終了（ハング検知）。
            ( sleep 420; kill -9 "$pid" 2>/dev/null; pkill -9 xctest 2>/dev/null; pkill -9 swift-package 2>/dev/null ) &
            watchdog=$!
            wait "$pid"; rc=$?
            kill "$watchdog" 2>/dev/null
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then
              echo "swift test passed on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::swift test attempt ${attempt} failed/hung (rc=${rc}); retrying"
            pkill -9 xctest 2>/dev/null; pkill -9 swift-package 2>/dev/null
          done
          echo "::error::swift test failed after 3 attempts"
          exit 1

  # エンジン層（Sources/LaboLaboEngine）が Linux でもビルド・テストできることを継続的に
  # 実証するジョブ。LaboLaboStore（GRDB）は Ubuntu 標準の libsqlite3 が
  # SQLITE_ENABLE_SNAPSHOT 無効ビルドのため WAL スナップショット API がリンクできず、
  # Package.swift 側で Linux では対象から外している（詳細はそちらのコメント参照）。
  # swift:6.0 の公式イメージをそのままコンテナに使い、ツールチェイン導入の手間を省く。
  linux-engine-tests:
    name: linux engine tests
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: swift test (LaboLaboEngine only on Linux)
        run: swift test

  # rust/ ワークスペース（labolabo-core, クロスプラットフォーム化の Rust 移植先）。
  # golden fixtures（fixtures/expected/**）は Swift オラクルで生成済みのものをコミット
  # 済みなので、CI では swift 側の再生成は不要 -- cargo test はチェックイン済みの
  # 期待値と突き合わせるだけ。ubuntu / macOS 両方でツールチェイン差を早期に検知する。
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test

  # labolabo-app（gpui 端末シェル、第5波 a）。gpui はビルドが重いデスクトップ UI 依存
  # なので rust/Cargo.toml の default-members から外してあり（上の `rust` ジョブは
  # gpui を一切ビルドしない）、専用ジョブでのみ検証する。まずは macOS のみ -- Linux
  # 版 gpui のビルドはシステム依存の導入が重く、この波では見送り
  # （crates/labolabo-app/README.md 参照）。
  rust-app:
    name: rust-app (macos-15)
    runs-on: macos-15
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo build -p labolabo-app
        run: cargo build -p labolabo-app
      - name: cargo clippy -p labolabo-app
        run: cargo clippy -p labolabo-app --all-targets -- -D warnings

  # labolabo-term の ghostty-vt バックエンド（本命の VT コア＝実 libghostty-vt）を、
  # 実際に Zig 0.16 でベンダビルドしてテストするジョブ。既定バックエンド（alacritty,
  # 上の `rust` ジョブ）が crates.io だけで常に green なのに対し、こちらは外部依存が重く
  # 壊れやすい: (1) upstream ghostty はまだ Zig 0.15.2 要求（このクラスの Xcode/Zig
  # 破綻が理由）で、動くのは fork vancluever/ghostty の zig-0.16 ブランチ（PR
  # ghostty-org/ghostty#12726）を **ピン SHA** で使う暫定措置、(2) libghostty-vt-sys の
  # build.rs が zig のパッケージ依存をネットワーク取得する。よって **continue-on-error:
  # true** とし、この不安定な経路がマージをブロックしないようにする（本命バックエンドの
  # 継続的な実証が目的で、ゲートは既定の `rust` ジョブが担う）。upstream に 0.16 対応が
  # マージされたら GHOSTTY_REF を上流へ再ピンする。
  # 注: LIBGHOSTTY_VT_SYS_OPTIMIZE=ReleaseFast は rust/.cargo/config.toml [env] で既定化
  # 済み（未設定だと Zig が Debug ビルドになり ~2万倍遅くなる罠。spike M6c 参照）。ここでも
  # 明示して意図を可視化する。
  rust-term-ghostty:
    name: rust-term-ghostty (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    env:
      # vancluever/ghostty zig-0.16 ブランチのピン SHA（ローカル clone の
      # `git rev-parse HEAD` と一致）。upstream マージ後に再ピンする。
      GHOSTTY_REF: 4c729855e1ad03689d94af3e0a173b81ca423eb8
      GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
      LIBGHOSTTY_VT_SYS_OPTIMIZE: ReleaseFast
    steps:
      - uses: actions/checkout@v4
      - name: Checkout vancluever/ghostty (pinned)
        uses: actions/checkout@v4
        with:
          repository: vancluever/ghostty
          ref: ${{ env.GHOSTTY_REF }}
          path: ghostty-src
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo test (backend-ghostty-vt)
        working-directory: rust
        run: cargo test -p labolabo-term --no-default-features --features backend-ghostty-vt

  # アプリ層のビルドとテスト（エンジンの swift test では届かない SwiftUI/AppKit 層）。
  # XcodeGen で .xcodeproj を生成 → 一度ビルド → アプリ単体テスト（ブロッキング）→
  # 起動＋メニュー開閉の UI スモーク（当面は informational: ランナー権限差で不安定な
  # 間はマージをブロックしない。CI で安定を確認できたら continue-on-error を外す）。
  app-tests:
    name: app build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec app/project.yml
      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project app/LaboLabo.xcodeproj \
            -scheme LaboLabo \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: App unit tests
        run: |
          xcodebuild test-without-building \
            -project app/LaboLabo.xcodeproj \
            -scheme LaboLabo \
            -only-testing:LaboLaboAppTests \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: UI smoke (informational)
        continue-on-error: true
        run: |
          xcodebuild test-without-building \
            -project app/LaboLabo.xcodeproj \
            -scheme LaboLabo \
            -only-testing:LaboLaboUITests \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
