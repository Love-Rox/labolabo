name: Rust cask bump

# Rust 版（rs-v* タグ）のリリースが **publish** されたら、homebrew-tap の
# `labolabo` cask を新バージョンへ自動更新する。Swift 版
# （release-build.yml 内の "Bump Homebrew cask" ステップ、v* タグ限定）の
# Rust 版対応。draft 作成時点（rust-release.yml）ではなく publish 時に
# 動くのは、draft の間はアセット URL が未公開で cask が 404 を指して
# しまうため。
#
# 1.1.0 改名（Swift 版引退）: bump 対象は `labolabo-rs` cask ではなく
# **`Casks/labolabo.rb`**（正式名 cask）。前提として tap 側の labolabo.rb
# が Rust 版のリリース形態（`rs-v#{version}` タグ / `LaboLabo-#{version}.zip`
# アセット / `LaboLabo.app`）を指すように書き換わっていること -- この
# ワークフローは version / sha256 の 2 行しか触らないため、url が旧
# Swift 版の `v#{version}` タグを指したままだと bump 後の cask が 404 に
# なる。tap 側の切り替えと labolabo-rs cask の廃止手続きはこのリポジトリ
# の外（Love-Rox/homebrew-tap）の作業。
#
# HOMEBREW_TAP_TOKEN（Love-Rox/homebrew-tap へ Contents: Read and write を
# 持つ fine-grained PAT。Swift 版 release-build.yml の "Bump Homebrew cask"
# ステップと同じ既存 secret）が未設定ならスキップする（Swift 版と同じ方針）。

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  bump:
    name: bump labolabo cask
    if: startsWith(github.event.release.tag_name, 'rs-v')
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Download macOS asset and compute sha256
        id: asset
        run: |
          set -euo pipefail
          if [ -z "$TAP_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN 未設定のため cask bump をスキップします"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${TAG#rs-v}"
          # macOS 用 zip は LaboLabo-<version>.zip（linux/windows は
          # ファイル名にプラットフォーム名を含むので単純一致で拾える）
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "LaboLabo-${VERSION}.zip" --output asset.zip
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum asset.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bump Casks/labolabo.rb
        if: steps.asset.outputs.skip == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.asset.outputs.version }}"
          SHA="${{ steps.asset.outputs.sha256 }}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Love-Rox/homebrew-tap.git" tap
          cd tap
          sed -i -E "s/  version \"[^\"]*\"/  version \"${VERSION}\"/" Casks/labolabo.rb
          sed -i -E "s/  sha256 \"[^\"]*\"/  sha256 \"${SHA}\"/" Casks/labolabo.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "labolabo ${VERSION}"
          git push
