name: Rust app bundle

# Rust 版 labolabo-app（gpui）をプラットフォーム別の配布物にパッケージし、workflow の
# artifact としてアップロードする。**手動実行のみ**（自動トリガなし）— Rust 版はまだ
# 配布物として正式リリースしていないため、release-please / release-build.yml（Swift 版）
# とは独立に置く。将来 Rust 版を正式リリースする際の統合方針は別途判断する。
#
# - macOS: `.app` バンドル + zip（scripts/bundle-macos.sh）。署名は Swift 版の
#   release-build.yml と同じ **アドホック**（`codesign -s -`）。Developer ID /
#   notarization は導入しない。
# - Linux: 第7波 a で追加。bin/ 3 バイナリ + .desktop ランチャ + install.sh + README を
#   tar.gz に固める（scripts/package-linux.sh）。署名なし（Linux の tarball 配布に
#   相当する署名慣行がない）。**この成果物の実機 GUI 起動は未検証**（CI はビルドと
#   ヘッドレステストのみ — crates/labolabo-app/README.md の "Linux" 節参照）。
# - Windows: 第7波 c で追加。bin\ 3 バイナリ + アイコン（.ico、リポジトリにコミット
#   済み — crates/labolabo-app/resources/windows/labolabo-rs.ico）+ README を zip に
#   固める（scripts/package-windows.ps1）。署名なし（コード署名証明書は未取得）。
#   exe へのアイコン埋め込みはせず zip 同梱 + ショートカット案内に縮退（判断は
#   scripts/package-windows.ps1 と crates/labolabo-app/README.md の "Windows" 節に
#   明記）。**この成果物の実機 GUI 起動は未検証**（CI はビルドとヘッドレステストの
#   み — 同 README 参照）。
on:
  workflow_dispatch:

jobs:
  # macOS/Linux は既定で ghostty-vt バックエンド（配布物の本命 --
  # rust/README.md「配布 vs 開発の既定バックエンド」参照）でビルドする。
  # `ci.yml`の `rust-term-ghostty` ジョブと**全く同じ**段取り（同じ fork ピン
  # SHA・同じ Zig バージョン） -- 詳しい理由は `rust-release.yml`の同名
  # ジョブのコメント参照（この workflow は手動ビルド用の姉妹ワークフロー、
  # ロジックは重複させず要点だけここに書く）。GHOSTTY_REF を更新する際は
  # ci.yml/rust-release.yml もあわせて揃えること。
  bundle:
    name: bundle (macos-15)
    runs-on: macos-15
    env:
      GHOSTTY_REF: 4c729855e1ad03689d94af3e0a173b81ca423eb8
      GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
      LIBGHOSTTY_VT_SYS_OPTIMIZE: ReleaseFast
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vancluever/ghostty (pinned)
        uses: actions/checkout@v4
        with:
          repository: vancluever/ghostty
          ref: ${{ env.GHOSTTY_REF }}
          path: ghostty-src

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Bundle (build + package + ad-hoc sign)
        run: ./scripts/bundle-macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaboLabo-macos
          path: rust/target/bundle/*.zip
          if-no-files-found: error

  package-linux:
    name: package (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      GHOSTTY_REF: 4c729855e1ad03689d94af3e0a173b81ca423eb8
      GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
      LIBGHOSTTY_VT_SYS_OPTIMIZE: ReleaseFast
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vancluever/ghostty (pinned)
        uses: actions/checkout@v4
        with:
          repository: vancluever/ghostty
          ref: ${{ env.GHOSTTY_REF }}
          path: ghostty-src

      # ci.yml の rust-app-linux ジョブと同じリンク時依存（コメントもそちらを参照）。
      - name: Install system dependencies (gpui link-time deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libfreetype-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Package (release build + tar.gz)
        run: ./scripts/package-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaboLabo-linux
          path: rust/target/package/*.tar.gz
          if-no-files-found: error

  # Windows は alacritty のまま（未検証な libghostty の Windows ビルドを
  # 要求しない -- rust-release.yml の同名ジョブのコメント参照）。
  # `scripts/package-windows.ps1` はバックエンド選択の概念自体を持たず、
  # 何も変えていない。
  package-windows:
    name: package (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Package (release build + zip)
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaboLabo-windows
          path: rust/target/package/*.zip
          if-no-files-found: error
