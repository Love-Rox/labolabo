common:
  close: "Close"

# Wave 8d: the first-launch Swift-import confirmation prompt
# (`crate::import_prompt`). Appended at the end of the file -- keeps the
# merge-conflict surface small against other agents editing this file
# concurrently (sidebar.rs/task_workspace.rs-area locale additions), rather
# than inserting into the middle of an existing block.
import_prompt:
  title: "Swift app data found"
  body: "Import its tasks and layout?"
  once_notice: "This confirmation only appears once."
  accept: "Import"
  decline: "Don't Import"

# Wave 10 (sidebar personalization): shared color-picker strings
# (`crate::color_picker` -- used by both the task color phase and the tab
# color popover). Appended at the end of the file, same rationale as the
# wave-8d block above.
color:
  none: "None"
  custom_label: "Custom (#rrggbb)"
  custom_apply: "Apply"
  invalid_hex: "Enter a color as #rrggbb"
  tab_menu_title: "Tab color"

# Wave 13b §1 (window-integrated toolbar): the top status pill's
# (`crate::titlebar`) strings. Appended at the end, same rationale as the
# wave-8d/wave-10 blocks above.
titlebar:
  kind_worktree: "worktree"
  kind_attached: "attached"
  changes_clean: "Clean"
  changes_count: "%{count} file(s) changed"
  # Wave 16 #3 (PR status badge): the status pill's PR segment.
  pr_draft: "Draft"
  pr_open: "Open"
  pr_merged: "Merged"
  pr_closed: "Closed"
