  # 第13波b §3 (空状態のデザイン): 以前はここに導線を含む長文を直接表示
  # していたが、中央配置のアイコン + 1 行 + 主要アクションボタンへ差し替え
  # たため、本文は短い案内文に、導線はボタン本体
  # (`no_task_selected_action`) の文言へ分離した。
  no_task_selected: "作業が選択されていません"
  no_task_selected_action: "＋ 新しい作業"
