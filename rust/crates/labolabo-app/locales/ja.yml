common:
  close: "閉じる"

# 第8波d: 起動時の Swift 版インポート確認プロンプト (`crate::import_prompt`)。
# ファイル末尾への追記 -- 並行編集中の他エージェント（sidebar.rs/
# task_workspace.rs 周りのロケール追記）とのコンフリクト面を小さくするため、
# 既存ブロックの途中には挿入しない。
import_prompt:
  title: "Swift 版のデータが見つかりました"
  body: "作業とレイアウトを取り込みますか？"
  once_notice: "この確認は今回限りです。"
  accept: "取り込む"
  decline: "取り込まない"

# 第10波 (サイドバーのパーソナライズ): 色ピッカー共通の文言
# (`crate::color_picker` -- タスクの色設定とタブの色ポップオーバーで共用)。
# 第8波d ブロックと同じ理由でファイル末尾へ追記。
color:
  none: "なし"
  custom_label: "カスタム (#rrggbb)"
  custom_apply: "適用"
  invalid_hex: "#rrggbb 形式で入力してください"
  tab_menu_title: "タブの色"

# 第13波b §1 (ウィンドウ一体型ツールバー): ウィンドウ上部のステータスピル
# (`crate::titlebar`) の文言。第8波d/第10波ブロックと同じ理由でファイル
# 末尾へ追記。
titlebar:
  kind_worktree: "worktree"
  kind_attached: "直付け"
  changes_clean: "クリーン"
  changes_count: "%{count} 件変更"
  # 第16波 #3 (PR 状態バッジ): ステータスピルの PR セグメント。
  pr_draft: "ドラフト"
  pr_open: "オープン"
  pr_merged: "マージ済み"
  pr_closed: "クローズ済み"
